# ============================================================
# Swarme — Production CI/CD Pipeline
# ============================================================
#
# Trigger: Push to `main`
#
# Steps:
#   1. Build dashboard → deploy to Cloudflare Pages
#   2. Type-check + deploy workers to production
#   3. Apply D1 migrations (if any new migration files)
#
# Required GitHub Secrets:
#   CLOUDFLARE_API_TOKEN  — API Token with Workers + D1 + KV + Pages permissions
#   CLOUDFLARE_ACCOUNT_ID — Your Cloudflare account ID
#
# ============================================================

name: Production — Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false  # Never cancel a production deploy mid-flight

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────
  # Job 1: Build + deploy dashboard to Cloudflare Pages
  # ─────────────────────────────────────────
  dashboard:
    name: Dashboard — Build & Deploy to Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build dashboard
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@3.78.12 pages deploy dist/public --project-name=swarme --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ─────────────────────────────────────────
  # Job 2: Deploy workers to production
  # ─────────────────────────────────────────
  workers:
    name: Workers — Deploy to Production
    runs-on: ubuntu-latest
    needs: dashboard
    environment:
      name: production
      url: https://api.swarme.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: workers/package-lock.json

      - name: Install worker dependencies
        working-directory: workers
        run: npm ci

      - name: Type check workers (non-blocking)
        working-directory: workers
        continue-on-error: true
        run: npx tsc --noEmit

      - name: Apply D1 migrations
        working-directory: workers
        run: |
          for migration in migrations/*.sql; do
            echo "Applying $migration..."
            npx wrangler d1 execute edge-swarm-db --env production --remote --file="$migration" || true
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to production
        working-directory: workers
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test
        if: success()
        run: |
          echo "Waiting 5s for propagation..."
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.swarme.io/api/public/config)
          echo "Health check returned: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Smoke test returned HTTP $STATUS (expected 200)"
          fi
