# ============================================================
# Swarme — Production CI/CD Pipeline (Phase 25)
# ============================================================
#
# Trigger: Push to `main` (merge of a PR)
#
# Steps:
#   1. Checkout → Node.js setup → Install
#   2. Type-check + build the dashboard
#   3. Type-check + deploy workers to production
#   4. Apply D1 migrations (if any new migration files)
#
# Required GitHub Secrets:
#   CLOUDFLARE_API_TOKEN  — API Token with Workers + D1 + KV permissions
#   CLOUDFLARE_ACCOUNT_ID — Your Cloudflare account ID
#
# ============================================================

name: Production — Deploy

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false  # Never cancel a production deploy mid-flight

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────
  # Job 1: Lint, type-check, and build the dashboard
  # ─────────────────────────────────────────
  dashboard:
    name: Dashboard — Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build dashboard
        run: npm run build

  # ─────────────────────────────────────────
  # Job 2: Deploy workers to production
  # ─────────────────────────────────────────
  workers:
    name: Workers — Deploy to Production
    runs-on: ubuntu-latest
    needs: dashboard
    environment:
      name: production
      url: https://swarme-api.${{ secrets.CLOUDFLARE_SUBDOMAIN || 'your-subdomain' }}.workers.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: workers/package-lock.json

      - name: Install worker dependencies
        working-directory: workers
        run: npm ci

      - name: Type check workers
        working-directory: workers
        run: npx tsc --noEmit

      - name: Apply D1 migrations
        working-directory: workers
        run: |
          for migration in migrations/*.sql; do
            echo "Applying $migration..."
            npx wrangler d1 execute edge-swarm-db --env production --remote --file="$migration" || true
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to production
        working-directory: workers
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test
        if: success()
        run: |
          echo "Waiting 5s for propagation..."
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://swarme-api.${{ secrets.CLOUDFLARE_SUBDOMAIN || 'your-subdomain' }}.workers.dev/api/public/config)
          echo "Health check returned: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Smoke test returned HTTP $STATUS (expected 200)"
          fi
