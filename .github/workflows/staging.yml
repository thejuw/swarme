# ============================================================
# Swarme — Staging CI/CD Pipeline (Phase 25)
# ============================================================
#
# Trigger: Pull Request to `main`
#
# Steps:
#   1. Checkout → Node.js setup → Install
#   2. Lint + type-check the dashboard (Vite + React)
#   3. Build the dashboard and workers
#   4. Deploy workers to Cloudflare staging environment
#
# Required GitHub Secrets:
#   CLOUDFLARE_API_TOKEN  — API Token with Workers + D1 + KV permissions
#   CLOUDFLARE_ACCOUNT_ID — Your Cloudflare account ID
#
# ============================================================

name: Staging — PR Preview

on:
  pull_request:
    branches: [main]

concurrency:
  group: staging-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────
  # Job 1: Lint, type-check, and build the dashboard
  # ─────────────────────────────────────────
  dashboard:
    name: Dashboard — Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build dashboard
        run: npm run build

  # ─────────────────────────────────────────
  # Job 2: Type-check and deploy workers to staging
  # ─────────────────────────────────────────
  workers:
    name: Workers — Check & Deploy to Staging
    runs-on: ubuntu-latest
    needs: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: workers/package-lock.json

      - name: Install worker dependencies
        working-directory: workers
        run: npm ci

      - name: Type check workers
        working-directory: workers
        run: npx tsc --noEmit

      - name: Deploy to staging
        working-directory: workers
        run: npx wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post deployment URL
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Staging deployment complete.**\n\nWorker: \`swarme-api-staging\`\nEnvironment: \`staging\`\n\nTest with:\n\`\`\`bash\ncurl https://swarme-api-staging.<subdomain>.workers.dev/api/projects\n\`\`\``
            })
